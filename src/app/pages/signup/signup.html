<gb-section variant="dark" class="min-h-screen py-20">
    <div class="text-center mb-10">
      <h1 gbText="h2" class="mb-4">The Chronicler's Circle</h1>
      <p gbText="body" class="italic opacity-80">
        Enter your details to receive the <span class="text-brand-primary">Human First</span> worldbuilding framework and weekly lore updates.
      </p>
    </div>

    <form class="max-w-md mx-auto">

      <gb-form-field forId="name">
        <span label>Nom de Plume (Your Name)</span>
        <input gbInput id="name" type="text" placeholder="e.g. Elara of the Grain">
      </gb-form-field>

      <gb-form-field forId="email">
        <span label>Raven Address (Email)</span>
        <input gbInput id="email" type="email" placeholder="messenger@domain.com">
      </gb-form-field>

      <div class="mt-8 text-center">
        <button gbBtnSeal size="lg" class="w-full">
          Seal the Pact
        </button>

        <p gbText="note" class="mt-6">
          We respect the grain. No spam, only substance.
          Unsubscribe by burning the raven's letter at any time.
        </p>
      </div>

    </form>
</gb-section>
