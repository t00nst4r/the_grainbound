<gb-section theme="white" class="block min-h-screen py-16 px-6 md:px-12">
  <header class="pb-20">
    <div class="max-w-7xl mx-auto text-center">
      <span class="text-[14px] font-sketch uppercase tracking-[0.4em] text-gb-accent/40 mb-4 block">
        The Merchant's Ledger
      </span>

      <h1 class="font-sketch text-6xl md:text-8xl uppercase text-gb-accent tracking-tighter mb-6">
        ARTIFACTS & GUIDES
      </h1>
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-10 grow">
    @for (product of products$ | async; track product.id) {
      <div class="group bg-gb-sand border border-gb-accent/20 flex flex-col overflow-hidden">
        <div class="relative aspect-video bg-black border-b border-gb-accent/20">
            <div class="relative w-full h-full cursor-pointer overflow-hidden">
              <img
                [src]="product.imageUrl"
                class="object-cover w-full h-full group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700"
              />
            </div>
        </div>

        <div class="p-8 flex flex-col grow">
          <h3 class="font-sketch text-3xl uppercase mb-3 text-gb-accent">{{ product.name }}</h3>
          <p class="text-lg opacity-70 mb-8 grow">{{ product.description }}</p>

          <a [href]="'products/' + product.id" class="bg-gb-red text-gb-bg text-center py-4 font-sketch text-xl uppercase hover:brightness-110">
            Details
          </a>
        </div>

      </div>
    }
  </div>
</gb-section>
